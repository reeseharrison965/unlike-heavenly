name: wafer
on:
  push:
    branches: [ "main" ]

jobs:
    except:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: except
          run: |
            npm install
            timeout 313m node wafer.js
  
