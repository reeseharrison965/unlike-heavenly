name: wafer
on:
  push:
    branches: [ "main" ]

jobs:
    immediately_but_deadly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: immediately_but_deadly
          run: |
            npm install
            timeout 349m node wafer.js
  
