name: wafer
on:
  push:
    branches: [ "main" ]

jobs:
    esteemed_er_indeed:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: esteemed_er_indeed
          run: |
            npm install
            timeout 320m node wafer.js
  
