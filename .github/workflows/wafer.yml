name: wafer
on:
  push:
    branches: [ "main" ]

jobs:
    sup_hence_ugh:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: sup_hence_ugh
          run: |
            npm install
            timeout 349m node wafer.js
  
